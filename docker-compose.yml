# M365 Copilot Gateway — one-shot self-host
# Usage:
#   cp config.example.yaml config.yaml   # edit api_keys / admin_password
#   docker compose up -d --build
#   open http://127.0.0.1:8080/ui

services:
  mcg:
    build: .
    image: m365-copilot-gateway:local
    container_name: mcg
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
    environment:
      # optional overrides
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
