# Copy to config.yaml

gateway:
  # 0.0.0.0 if exposing via Docker / reverse proxy
  host: "127.0.0.1"
  port: 8080
  # Required for /v1/* — generate: openssl rand -hex 24
  api_keys:
    - "change-me-to-a-long-random-string"
  # WebUI /ui password
  admin_password: "change-me-admin"
  data_dir: "./data"
  # e.g. ["http://localhost:3000"] for browser frontends
  cors_origins: []

substrate:
  origin: "https://m365.cloud.microsoft"
  time_zone: "Asia/Shanghai"
  # reconnect each turn is more reliable; set true to reuse sockets (experimental)
  reuse_socket: false
  request_timeout_sec: 120
  # dump SignalR frames for reverse-engineering
  dump_frames: false

token:
  refresh_skew_sec: 300
  prefer_cdp: false
  # Mature: Office web Copilot client + Sydney scopes (cramt/lezi)
  use_sydney_msal: true
  keepalive_enabled: true
  keepalive_interval_sec: 120
  msal_client_id: "c0ab8ce9-e9a0-42e7-b064-33d422df41f1"
  msal_authority: "https://login.microsoftonline.com/common"
  msal_redirect_uri: "https://login.microsoftonline.com/common/oauth2/nativeclient"
  msal_scopes: "https://substrate.office.com/sydney/M365Chat.Read https://substrate.office.com/sydney/sydney.readwrite"
  # Legacy custom Entra OAuth — leave null
  oauth_client_id: null
  oauth_tenant: "common"
  oauth_scope: "https://substrate.office.com/ows/.default offline_access openid profile"
  oauth_client_secret: null

pool:
  strategy: "round_robin"  # round_robin | sticky | least_load
  cooldown_sec: 60
  max_consecutive_errors: 3

rate_limit:
  # disabled by default; enable for production deployments
  enabled: false
  # requests per minute per API key (or per IP for unauthenticated requests)
  requests_per_minute: 60
  # burst window allowlist size
  burst: 10

tools:
  # max model↔tool rounds inside one client request
  max_rounds: 8
  repair_rounds: 1
  # client executes tools (recommended)
  execution: "client"
  # inject strategies: fenced | json | shell_route
  strategies:
    - fenced
    - shell_route

models:
  # 公开模型列表（/v1/models 只暴露这里；不要塞一堆别名）
  advertise:
    - id: m365-copilot
      tone: Magic
      label: "M365 Copilot（自动）"
    - id: gpt-5.5-reasoning
      tone: Gpt_5_5_Reasoning
      label: "GPT-5.5 深度推理"
    - id: gpt-5.5
      tone: Gpt_5_5_Chat
      label: "GPT-5.5 对话"
    - id: gpt-5.4-reasoning
      tone: Gpt_5_4_Reasoning
      label: "GPT-5.4 深度推理"
    - id: claude-sonnet-4.6
      tone: Claude_Sonnet
      label: "Claude Sonnet 4.6"
    - id: claude-sonnet
      tone: Claude_Sonnet
      label: "Claude Sonnet"
